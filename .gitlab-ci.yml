stages:
  - test
  - build
  - deploy

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_DRIVER: overlay2

# ──────────────────────────────────────────────
# TEST
# ──────────────────────────────────────────────
.test_service:
  stage: test
  image: python:3.12-slim
  before_script:
    - cd "services/$SERVICE_NAME"
    - pip install --no-cache-dir -r requirements.txt
  script:
    - python -m pytest tests/unit tests/api -q --import-mode=importlib
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'

test:carpayin-backend:
  extends: .test_service
  variables:
    SERVICE_NAME: carpayin-backend
    PUBLIC_BASE_URL: https://api.carpayin.test
    HYUNDAI_CLIENT_ID: ci-test-client-id
    HYUNDAI_CLIENT_SECRET: ci-test-client-secret

test:mock-pg:
  extends: .test_service
  variables:
    SERVICE_NAME: mock-pg

test:pms:
  extends: .test_service
  variables:
    SERVICE_NAME: pms

# ──────────────────────────────────────────────
# BUILD → GitLab Container Registry
# main 브랜치 push 또는 버전 태그(x.y.z)에 실행
# ──────────────────────────────────────────────
.build_registry_service:
  stage: build
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - IMAGE="$CI_REGISTRY_IMAGE/$IMAGE_NAME"
    - TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - docker build --pull -f "services/$SERVICE_NAME/Dockerfile"
        -t "$IMAGE:$TAG"
        -t "$IMAGE:latest"
        "services/$SERVICE_NAME"
    - docker push "$IMAGE:$TAG"
    - docker push "$IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'

build:registry:carpayin-backend:
  extends: .build_registry_service
  needs:
    - test:carpayin-backend
  variables:
    SERVICE_NAME: carpayin-backend
    IMAGE_NAME: carpayin-backend

build:registry:mock-pg:
  extends: .build_registry_service
  needs:
    - test:mock-pg
  variables:
    SERVICE_NAME: mock-pg
    IMAGE_NAME: mock-pg

build:registry:pms:
  extends: .build_registry_service
  needs:
    - test:pms
  variables:
    SERVICE_NAME: pms
    IMAGE_NAME: pms

# ──────────────────────────────────────────────
# BUILD → AWS ECR (버전 태그 + EC2 러너 있을 때만)
# ──────────────────────────────────────────────
.build_ecr_service:
  stage: build
  tags:
    - ec2-docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - dnf install -y docker || yum install -y docker
    - ': "${AWS_REGION:?Set AWS_REGION in GitLab CI/CD variables}"'
    - export AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID:-$(aws sts get-caller-identity --query Account --output text)}"
    - export AWS_DEFAULT_REGION="$AWS_REGION"
    - export ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
    - export ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX:+$ECR_REPOSITORY_PREFIX/}$IMAGE_NAME"
    - export IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
    - aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" > /dev/null
  script:
    - export VERSION_TAG="$CI_COMMIT_TAG"
    - docker build --pull -f "services/$SERVICE_NAME/Dockerfile" -t "$IMAGE:$VERSION_TAG" -t "$IMAGE:latest" "services/$SERVICE_NAME"
    - docker push "$IMAGE:$VERSION_TAG"
    - docker push "$IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'
      when: on_success

build:ecr:carpayin-backend:
  extends: .build_ecr_service
  needs:
    - test:carpayin-backend
  variables:
    SERVICE_NAME: carpayin-backend
    IMAGE_NAME: carpayin-backend

build:ecr:mock-pg:
  extends: .build_ecr_service
  needs:
    - test:mock-pg
  variables:
    SERVICE_NAME: mock-pg
    IMAGE_NAME: mock-pg

build:ecr:pms:
  extends: .build_ecr_service
  needs:
    - test:pms
  variables:
    SERVICE_NAME: pms
    IMAGE_NAME: pms

# ──────────────────────────────────────────────
# DEPLOY → ECS (버전 태그 + 수동 승인)
# ──────────────────────────────────────────────
deploy:ecs:carpayin-backend:
  stage: deploy
  tags:
    - ec2-docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  needs:
    - build:ecr:carpayin-backend
  script:
    - ': "${AWS_REGION:?Set AWS_REGION in GitLab CI/CD variables}"'
    - ': "${ECS_CLUSTER:?Set ECS_CLUSTER in GitLab CI/CD variables}"'
    - ': "${ECS_SERVICE_CARPAYIN_BACKEND:?Set ECS_SERVICE_CARPAYIN_BACKEND in GitLab CI/CD variables}"'
    - aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_CARPAYIN_BACKEND" --force-new-deployment --region "$AWS_REGION"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^[0-9]+\.[0-9]+\.[0-9]+$/'
      when: manual
