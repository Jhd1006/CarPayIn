stages:
  - verify
  - build
  - deploy

variables:
  DOCKER_BUILDKIT: "1"

validate:merge-request:
  stage: verify
  tags:
    - local-deploy
  script:
    - Write-Host "Validating merge request pipeline"
    - git status --short
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

.build_service_image:
  image: docker:27.5.1
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
  script:
    - export IMAGE="$CI_REGISTRY_IMAGE/$IMAGE_NAME"
    - export VERSION_TAG="$CI_COMMIT_TAG"
    - docker build --pull -f services/Dockerfile --build-arg SERVICE_NAME="$SERVICE_NAME" -t "$IMAGE:$VERSION_TAG" -t "$IMAGE:latest" services
    - docker push "$IMAGE:$VERSION_TAG"
    - docker push "$IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+(\.[0-9]+)*$/'

build:carpayin-backend:
  extends: .build_service_image
  variables:
    SERVICE_NAME: carpayin-backend
    IMAGE_NAME: carpayin-backend

build:mock-card:
  extends: .build_service_image
  variables:
    SERVICE_NAME: mock-card
    IMAGE_NAME: mock-card

build:mock-pg:
  extends: .build_service_image
  variables:
    SERVICE_NAME: mock-pg
    IMAGE_NAME: mock-pg

build:pms:
  extends: .build_service_image
  variables:
    SERVICE_NAME: pms
    IMAGE_NAME: pms

deploy:local-compose:
  stage: deploy
  tags:
    - local-deploy
  needs:
    - build:carpayin-backend
    - build:mock-card
    - build:mock-pg
    - build:pms
  script:
    - $env:IMAGE_TAG = $env:CI_COMMIT_TAG
    - Remove-Item Env:\DOCKER_HOST -ErrorAction SilentlyContinue
    - Remove-Item Env:\DOCKER_TLS_CERTDIR -ErrorAction SilentlyContinue
    - powershell -ExecutionPolicy Bypass -File scripts\deploy-from-registry.ps1 -Tag $env:CI_COMMIT_TAG
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v[0-9]+(\.[0-9]+)*$/'
