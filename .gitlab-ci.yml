stages:
  - test
  - build
  - deploy

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_DRIVER: overlay2

# ──────────────────────────────────────────────
# TEST
# 모든 브랜치 push + MR 시 실행
# ──────────────────────────────────────────────
.test_service:
  stage: test
  image: python:3.12-slim
  before_script:
    - cd "services/$SERVICE_NAME"
    - pip install --no-cache-dir -r requirements.txt
  script:
    - python -m pytest tests/unit tests/api -q --import-mode=importlib
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

test:carpayin-backend:
  extends: .test_service
  variables:
    SERVICE_NAME: carpayin-backend
    PUBLIC_BASE_URL: https://api.carpayin.test
    HYUNDAI_CLIENT_ID: ci-test-client-id
    HYUNDAI_CLIENT_SECRET: ci-test-client-secret

test:mock-pg:
  extends: .test_service
  variables:
    SERVICE_NAME: mock-pg

test:pms:
  extends: .test_service
  variables:
    SERVICE_NAME: pms

# ──────────────────────────────────────────────
# BUILD → AWS ECR
# main 머지 시에만 실행
# ──────────────────────────────────────────────
.build_ecr_service:
  stage: build
  tags:
    - ec2-docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - dnf install -y docker || yum install -y docker
    - ': "${AWS_REGION:?Set AWS_REGION in GitLab CI/CD variables}"'
    - export AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID:-$(aws sts get-caller-identity --query Account --output text)}"
    - export AWS_DEFAULT_REGION="$AWS_REGION"
    - export ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
    - export ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX:+$ECR_REPOSITORY_PREFIX/}$IMAGE_NAME"
    - export IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
    - aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" > /dev/null
  script:
    - docker build --pull -f "services/$SERVICE_NAME/Dockerfile" -t "$IMAGE:0.0.$CI_PIPELINE_IID" -t "$IMAGE:latest" "services/$SERVICE_NAME"
    - docker push "$IMAGE:0.0.$CI_PIPELINE_IID"
    - docker push "$IMAGE:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

build:ecr:carpayin-backend:
  extends: .build_ecr_service
  needs:
    - test:carpayin-backend
  variables:
    SERVICE_NAME: carpayin-backend
    IMAGE_NAME: carpayin-backend

build:ecr:mock-pg:
  extends: .build_ecr_service
  needs:
    - test:mock-pg
  variables:
    SERVICE_NAME: mock-pg
    IMAGE_NAME: mock-pg

build:ecr:pms:
  extends: .build_ecr_service
  needs:
    - test:pms
  variables:
    SERVICE_NAME: pms
    IMAGE_NAME: pms

# ──────────────────────────────────────────────
# DEPLOY → ECS (carpayin-backend)
# ──────────────────────────────────────────────
deploy:ecs:carpayin-backend:
  stage: deploy
  tags:
    - ec2-docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  needs:
    - build:ecr:carpayin-backend
  script:
    - ': "${AWS_REGION:?Set AWS_REGION in GitLab CI/CD variables}"'
    - ': "${ECS_CLUSTER:?Set ECS_CLUSTER in GitLab CI/CD variables}"'
    - ': "${ECS_SERVICE_CARPAYIN_BACKEND:?Set ECS_SERVICE_CARPAYIN_BACKEND in GitLab CI/CD variables}"'
    - aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_CARPAYIN_BACKEND" --force-new-deployment --region "$AWS_REGION"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ──────────────────────────────────────────────
# DEPLOY → EC2 via SSM (pms, mock-pg)
# GitLab CI/CD 변수 필요: MOCKPMS_EC2_INSTANCE_ID, MOCKPG_EC2_INSTANCE_ID
# ──────────────────────────────────────────────
.deploy_ec2:
  stage: deploy
  tags:
    - ec2-docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  script:
    - ': "${AWS_REGION:?Set AWS_REGION in GitLab CI/CD variables}"'
    - ': "${EC2_INSTANCE_ID:?}"'
    - export ECR_REGISTRY="353488928095.dkr.ecr.${AWS_REGION}.amazonaws.com"
    - |
      COMPOSE_B64=$(base64 -w 0 "infra_ec2/${INFRA_DIR}/docker-compose.yaml")

      cat > /tmp/ssm_commands.json << SSMEOF
      {
        "commands": [
          "mkdir -p /home/ubuntu/deploy",
          "echo ${COMPOSE_B64} | base64 -d | tee /home/ubuntu/deploy/docker-compose.yaml > /dev/null",
          "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
          "docker pull ${ECR_REGISTRY}/${IMAGE_NAME}:latest",
          "docker stop \$(docker ps -aq) 2>/dev/null || true",
          "docker rm \$(docker ps -aq) 2>/dev/null || true",
          "cd /home/ubuntu/deploy && docker compose up -d"
        ]
      }
      SSMEOF

      COMMAND_ID=$(aws ssm send-command \
        --instance-ids "${EC2_INSTANCE_ID}" \
        --document-name "AWS-RunShellScript" \
        --parameters file:///tmp/ssm_commands.json \
        --region "${AWS_REGION}" \
        --query "Command.CommandId" \
        --output text)
      echo "SSM Command ID: ${COMMAND_ID}"

      aws ssm wait command-executed \
        --command-id "${COMMAND_ID}" \
        --instance-id "${EC2_INSTANCE_ID}" \
        --region "${AWS_REGION}"

      STATUS=$(aws ssm get-command-invocation \
        --command-id "${COMMAND_ID}" \
        --instance-id "${EC2_INSTANCE_ID}" \
        --region "${AWS_REGION}" \
        --query "Status" --output text)
      echo "배포 상태: ${STATUS}"
      [ "${STATUS}" = "Success" ] || exit 1
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:ec2:pms:
  extends: .deploy_ec2
  needs:
    - build:ecr:pms
  variables:
    INFRA_DIR: mockpms
    IMAGE_NAME: pms
    EC2_INSTANCE_ID: $MOCKPMS_EC2_INSTANCE_ID

deploy:ec2:mock-pg:
  extends: .deploy_ec2
  needs:
    - build:ecr:mock-pg
  variables:
    INFRA_DIR: mockpg
    IMAGE_NAME: mock-pg
    EC2_INSTANCE_ID: $MOCKPG_EC2_INSTANCE_ID
