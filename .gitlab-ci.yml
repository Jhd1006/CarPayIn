stages:
  - test
  - build
  - deploy

variables:
  DOCKER_BUILDKIT: "1"
  DOCKER_DRIVER: overlay2

# ──────────────────────────────────────────────
# TEST
# 모든 브랜치 push + MR 시 실행
# ──────────────────────────────────────────────
.test_service:
  stage: test
  image: python:3.12-slim
  before_script:
    - cd "services/$SERVICE_NAME"
    - pip install --no-cache-dir -r requirements.txt
  script:
    - python -m pytest tests/unit tests/api -q --import-mode=importlib
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

test:carpayin-backend:
  extends: .test_service
  variables:
    SERVICE_NAME: carpayin-backend
    PUBLIC_BASE_URL: https://api.carpayin.test
    HYUNDAI_CLIENT_ID: ci-test-client-id
    HYUNDAI_CLIENT_SECRET: ci-test-client-secret

test:mock-pg:
  extends: .test_service
  variables:
    SERVICE_NAME: mock-pg

test:pms:
  extends: .test_service
  variables:
    SERVICE_NAME: pms

# ──────────────────────────────────────────────
# BUILD → AWS ECR
# 서비스 코드가 변경된 경우에만 실행
# ──────────────────────────────────────────────
.build_ecr_service:
  stage: build
  tags:
    - ec2-docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  services:
    - name: docker:27.5.1-dind
      command: ["--tls=false"]
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - dnf install -y docker || yum install -y docker
    - ': "${AWS_REGION:?Set AWS_REGION in GitLab CI/CD variables}"'
    - export AWS_ACCOUNT_ID="${AWS_ACCOUNT_ID:-$(aws sts get-caller-identity --query Account --output text)}"
    - export AWS_DEFAULT_REGION="$AWS_REGION"
    - export ECR_REGISTRY="$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
    - export ECR_REPOSITORY="${ECR_REPOSITORY_PREFIX:+$ECR_REPOSITORY_PREFIX/}$IMAGE_NAME"
    - export IMAGE="$ECR_REGISTRY/$ECR_REPOSITORY"
    - aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
    - aws ecr describe-repositories --repository-names "$ECR_REPOSITORY" --region "$AWS_REGION" > /dev/null
  script:
    - docker build --pull --build-arg GIT_COMMIT=$CI_COMMIT_SHORT_SHA -f "services/$SERVICE_NAME/Dockerfile" -t "$IMAGE:0.0.$CI_PIPELINE_IID" -t "$IMAGE:latest" "services/$SERVICE_NAME"
    - docker push "$IMAGE:0.0.$CI_PIPELINE_IID"
    - docker push "$IMAGE:latest"

build:ecr:carpayin-backend:
  extends: .build_ecr_service
  needs:
    - test:carpayin-backend
  variables:
    SERVICE_NAME: carpayin-backend
    IMAGE_NAME: carpayin-backend
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - services/carpayin-backend/**/*

build:ecr:mock-pg:
  extends: .build_ecr_service
  needs:
    - test:mock-pg
  variables:
    SERVICE_NAME: mock-pg
    IMAGE_NAME: mock-pg
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - services/mock-pg/**/*

build:ecr:pms:
  extends: .build_ecr_service
  needs:
    - test:pms
  variables:
    SERVICE_NAME: pms
    IMAGE_NAME: pms
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - services/pms/**/*

# ──────────────────────────────────────────────
# DEPLOY → ECS (carpayin-backend)
# main push 시 항상 실행 (빌드가 스킵돼도 최신 이미지로 재배포)
# ──────────────────────────────────────────────
deploy:ecs:carpayin-backend:
  stage: deploy
  tags:
    - ec2-docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  needs:
    - job: build:ecr:carpayin-backend
      optional: true
  script:
    - ': "${AWS_REGION:?Set AWS_REGION in GitLab CI/CD variables}"'
    - ': "${ECS_CLUSTER:?Set ECS_CLUSTER in GitLab CI/CD variables}"'
    - ': "${ECS_SERVICE_CARPAYIN_BACKEND:?Set ECS_SERVICE_CARPAYIN_BACKEND in GitLab CI/CD variables}"'
    - aws ecs update-service --cluster "$ECS_CLUSTER" --service "$ECS_SERVICE_CARPAYIN_BACKEND" --force-new-deployment --region "$AWS_REGION"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

# ──────────────────────────────────────────────
# DEPLOY → EC2 via SSM (pms, mock-pg)
# main push 시 항상 실행 (docker-compose.yaml만 바뀌어도 재배포)
# GitLab CI/CD 변수 필요 (Settings → CI/CD → Variables):
#   공통:          AWS_REGION, MOCKPMS_EC2_INSTANCE_ID, MOCKPG_EC2_INSTANCE_ID
#   mockpms 전용:  MOCKPMS_DATABASE_URL (Masked), MOCKPMS_WEBHOOK_TOKEN (Masked)
#                  CARPAYIN_BACKEND_BASE_URL, BARRIER_ENTRY_URL, BARRIER_EXIT_URL
#   mockpg 전용:   MOCKPG_DATABASE_URL (Masked), MOCKPG_WEBHOOK_SECRET (Masked)
# ──────────────────────────────────────────────
.deploy_ec2:
  stage: deploy
  tags:
    - ec2-docker
  image:
    name: public.ecr.aws/aws-cli/aws-cli:latest
    entrypoint: [""]
  script:
    - ': "${AWS_REGION:?Set AWS_REGION in GitLab CI/CD variables}"'
    - ': "${EC2_INSTANCE_ID:?}"'
    - export ECR_REGISTRY="353488928095.dkr.ecr.${AWS_REGION}.amazonaws.com"
    - |
      # 서비스별 민감 환경변수를 base64로 인코딩해 EC2 .env 파일로 전달
      case "${INFRA_DIR}" in
        mockpms)
          : "${CARPAYIN_BACKEND_BASE_URL:?Set CARPAYIN_BACKEND_BASE_URL in GitLab CI/CD variables (Settings -> CI/CD -> Variables)}"
          ENV_CONTENT=$(printf 'PMS_DATABASE_URL=%s\nPMS_WEBHOOK_TOKEN=%s\nCARPAYIN_BACKEND_BASE_URL=%s\nBARRIER_ENTRY_URL=%s\nBARRIER_EXIT_URL=%s\n' \
            "${MOCKPMS_DATABASE_URL:-}" "${MOCKPMS_WEBHOOK_TOKEN:-}" "${CARPAYIN_BACKEND_BASE_URL}" "${BARRIER_ENTRY_URL:-}" "${BARRIER_EXIT_URL:-}")
          ;;
        mockpg)
          ENV_CONTENT=$(printf 'MOCK_PG_DATABASE_URL=%s\nPG_WEBHOOK_SECRET=%s\n' \
            "${MOCKPG_DATABASE_URL:-}" "${MOCKPG_WEBHOOK_SECRET:-}")
          ;;
        *)
          ENV_CONTENT=""
          ;;
      esac
      ENV_B64=$(printf '%s' "$ENV_CONTENT" | base64 -w 0)
      COMPOSE_B64=$(base64 -w 0 "infra_ec2/${INFRA_DIR}/docker-compose.yaml")

      cat > /tmp/ssm_commands.json << SSMEOF
      {
        "commands": [
          "mkdir -p /home/ubuntu/deploy",
          "echo ${COMPOSE_B64} | base64 -d | tee /home/ubuntu/deploy/docker-compose.yaml > /dev/null",
          "[ -z '${ENV_B64}' ] || echo '${ENV_B64}' | base64 -d > /home/ubuntu/deploy/.env",
          "aws ecr get-login-password --region ${AWS_REGION} | docker login --username AWS --password-stdin ${ECR_REGISTRY}",
          "docker pull ${ECR_REGISTRY}/${IMAGE_NAME}:latest",
          "docker stop \$(docker ps -aq) 2>/dev/null || true",
          "docker rm \$(docker ps -aq) 2>/dev/null || true",
          "cd /home/ubuntu/deploy && docker compose up -d"
        ]
      }
      SSMEOF

      COMMAND_ID=$(aws ssm send-command \
        --instance-ids "${EC2_INSTANCE_ID}" \
        --document-name "AWS-RunShellScript" \
        --parameters file:///tmp/ssm_commands.json \
        --region "${AWS_REGION}" \
        --query "Command.CommandId" \
        --output text)
      echo "SSM Command ID: ${COMMAND_ID}"

      aws ssm wait command-executed \
        --command-id "${COMMAND_ID}" \
        --instance-id "${EC2_INSTANCE_ID}" \
        --region "${AWS_REGION}"

      STATUS=$(aws ssm get-command-invocation \
        --command-id "${COMMAND_ID}" \
        --instance-id "${EC2_INSTANCE_ID}" \
        --region "${AWS_REGION}" \
        --query "Status" --output text)
      echo "배포 상태: ${STATUS}"
      [ "${STATUS}" = "Success" ] || exit 1

deploy:ec2:pms:
  extends: .deploy_ec2
  needs:
    - job: build:ecr:pms
      optional: true
  variables:
    INFRA_DIR: mockpms
    IMAGE_NAME: pms
    EC2_INSTANCE_ID: $MOCKPMS_EC2_INSTANCE_ID
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

deploy:ec2:mock-pg:
  extends: .deploy_ec2
  needs:
    - job: build:ecr:mock-pg
      optional: true
  variables:
    INFRA_DIR: mockpg
    IMAGE_NAME: mock-pg
    EC2_INSTANCE_ID: $MOCKPG_EC2_INSTANCE_ID
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
