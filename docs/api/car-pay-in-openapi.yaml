      summary: 시뮬레이션 차량 위치 갱신
      description: |
        Webots 또는 로컬 테스트 도구가 시뮬레이션 차량 위치를 서버 메모리에 갱신합니다.
        이 endpoint는 로컬 시연/테스트 편의를 위한 상태 저장 API입니다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimLocationRequest'
      responses:
        '200':
          description: 갱신된 시뮬레이션 위치
          content:
            application/json:
