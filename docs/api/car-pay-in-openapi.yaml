openapi: 3.0.3
info:
  title: Car Pay-in API
  version: 1.0.0
  description: |
    Car Pay-in 서비스의 전체 API 명세입니다.
    - **Car Pay-in Backend API**: AAOS 앱과 통신하는 주요 API
    - **PMS 연동 API**: 주차 관제 시스템(PMS)과의 연동 API
    - **Mock PG 연동 API**: 결제 게이트웨이(PG)와의 연동 API

servers:
  - url: https://api.carpayin.example.com
    description: Car Pay-in Backend
  - url: https://pms.example.com
    description: PMS (Parking Management System)
  - url: https://pg.example.com
    description: Mock PG (Payment Gateway)
  - url: https://card.example.com
    description: Mock Card Company

tags:
  - name: Health
    description: 서비스 상태 확인
  - name: Auth
    description: QR 로그인 및 인증
  - name: Card
    description: 카드 등록
  - name: Parking
    description: 입차 알림 및 주차 세션
  - name: Payment
    description: 결제 처리
  - name: PMS
    description: PMS 연동 API (Car Pay-in → PMS 호출)
  - name: MockPG
    description: Mock PG 연동 API (Car Pay-in → PG 호출)
  - name: MockCard
    description: Mock Card 연동 API (Mock PG → Mock Card 호출)

# ─────────────────────────────────────────────
# Security Schemes
# ─────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: App Access Token (JWT)
    PmsWebhookSignature:
      type: apiKey
      in: header
      name: X-PMS-Signature
      description: PMS webhook 요청 검증용 HMAC signature

  # ─────────────────────────────────────────────
  # Reusable Schemas
  # ─────────────────────────────────────────────
  schemas:

    # ── 공통 ──────────────────────────────────
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: INVALID_TOKEN
        message:
          type: string
          example: 유효하지 않은 토큰입니다.

    # ── Auth ──────────────────────────────────
    QrSessionCreateRequest:
      type: object
      required: [login_session_id, vin_hash]
      properties:
        login_session_id:
          type: string
          description: 앱이 생성한 로그인 세션 ID
          example: "sess_abc123"
        vin_hash:
          type: string
          description: "SHA-256(VIN + loginSessionId)"
          example: "a3f1c2..."

    QrSessionCreateResponse:
      type: object
      properties:
        login_url:
          type: string
          description: QR 코드로 표시할 로그인 URL
          example: "https://api.carpayin.example.com/auth/hyundai/start?session_id=sess_abc123"

    SessionStatusResponse:
      type: object
      properties:
        status:
          type: string
          enum: [pending, complete]
          example: pending
        user_id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        cars:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/CarInfo'
        temp_access_token:
          type: string
          nullable: true
          description: 차량 확정용 임시 access token

    CarInfo:
      type: object
      properties:
        car_id:
          type: string
          example: "car_001"
        car_sellname:
          type: string
          example: "아이오닉 6"
        plate:
          type: string
          example: "12가 3456"

    ConfirmCarRequest:
      type: object
      required: [car_id, vin_hash]
      properties:
        car_id:
          type: string
          description: 사용자가 선택한 차량 ID
          example: "car_001"
        vin_hash:
          type: string
          description: "SHA-256(VIN + loginSessionId)"
          example: "a3f1c2..."

    ConfirmCarResponse:
      type: object
      properties:
        app_access_token:
          type: string
        app_refresh_token:
          type: string
        user_id:
          type: string
        name:
          type: string
        car_id:
          type: string
        car:
          $ref: '#/components/schemas/CarInfo'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string
          description: 발급받은 app refresh token
          example: "rt_xxxxxxxx"

    RefreshResponse:
      type: object
      properties:
        app_access_token:
          type: string
          description: 새로 발급된 app access token
        app_refresh_token:
          type: string
          nullable: true
          description: 새로 발급된 app refresh token (rotate 정책 적용 시에만 반환)

    # ── Card ──────────────────────────────────
    CardOrderRequest:
      type: object
      required: [plate, bank_name, agree_terms]
      properties:
        plate:
          type: string
          description: 사용자가 입력하거나 확인한 차량번호
          example: "12가 3456"
        bank_name:
          type: string
          description: 카드 등록에 사용할 카드사 또는 은행명
          example: "신한"
        agree_terms:
          type: boolean
          description: 개인정보 및 카드 등록 약관 동의 여부
          example: true

    CardOrderResponse:
      type: object
      properties:
        order_id:
          type: string
          example: "order_xyz789"
        pg_url:
          type: string
          description: PG 카드 등록 웹뷰 URL
          example: "https://pg.example.com/card-register?order_id=order_xyz789"
        webview_url:
          type: string
          description: 앱이 WebView로 열 PG 카드 등록 URL
          example: "https://pg.example.com/card-register?order_id=order_xyz789"

    CardWebhookRequest:
      type: object
      required: [order_id, billing_key, card_last_four, status, signature]
      properties:
        order_id:
          type: string
          example: "order_xyz789"
        billing_key:
          type: string
          example: "bk_aaa111"
        card_last_four:
          type: string
          example: "1234"
        status:
          type: string
          enum: [active]
          example: active
        signature:
          type: string
          description: PG webhook HMAC signature
          example: "9b1f..."

    # ── Parking ───────────────────────────────
    ParkingLotResponse:
      type: object
      required: [id, name, lat, lng]
      properties:
        id:
          type: string
          description: 제휴 주차장 ID
          example: "LOT_TEST_01"
        name:
          type: string
          description: 제휴 주차장 표시 이름
          example: "42dot 테스트 주차장"
        lat:
          type: number
          format: double
          description: 주차장 위도
          example: 37.48544722
        lng:
          type: number
          format: double
          description: 주차장 경도
          example: 127.03636666

    ParkingLotsResponse:
      type: object
      required: [lots]
      properties:
        lots:
          type: array
          items:
            $ref: '#/components/schemas/ParkingLotResponse'

    SimLocationRequest:
      type: object
      required: [lat, lng]
      properties:
        lat:
          type: number
          format: double
          description: 시뮬레이션 차량 위도
          example: 37.48544722
        lng:
          type: number
          format: double
          description: 시뮬레이션 차량 경도
          example: 127.03636666
        speed_kph:
          type: number
          format: double
          default: 0.0
          description: 차량 속도(km/h)
          example: 12.5
        heading:
          type: number
          format: double
          default: 0.0
          description: 진행 방향(degree)
          example: 90.0
        source:
          type: string
          default: webots
          description: 위치 업데이트 출처
          example: webots

    SimLocationResponse:
      type: object
      required: [lat, lng, speed_kph, heading, source, updated_at]
      properties:
        lat:
          type: number
          format: double
          example: 37.48544722
        lng:
          type: number
          format: double
          example: 127.03636666
        speed_kph:
          type: number
          format: double
          example: 12.5
        heading:
          type: number
          format: double
          example: 90.0
        source:
          type: string
          example: webots
        updated_at:
          type: string
          format: date-time
          description: 서버가 위치 상태를 갱신한 시각
          example: "2024-01-15T10:30:00Z"

    NavigateRequest:
      type: object
      required: [lot_id]
      properties:
        lot_id:
          type: string
          description: 길안내를 누른 제휴 주차장 ID
          example: "LOT_TEST_01"

    NavigateResponse:
      type: object
      properties:
        status:
          type: string
          enum: [registered]
          example: registered
        car_id:
          type: string
          description: 토큰에서 추출된 차량 ID
        lot_id:
          type: string
        plate:
          type: string
          description: DB에서 조회된 차량번호

    EntryWebhookRequest:
      type: object
      required: [pms_session_id, lot_id, plate, entry_time]
      properties:
        pms_session_id:
          type: string
          example: "pms_sess_001"
        lot_id:
          type: string
          example: "lot_001"
        plate:
          type: string
          example: "12가 3456"
        entry_time:
          type: string
          format: date-time
          example: "2024-01-15T10:30:00Z"

    EntryWebhookResponse:
      type: object
      properties:
        status:
          type: string
          enum: [confirmed, not_registered]
          example: confirmed
        session_id:
          type: string
          nullable: true
        car_id:
          type: string
          nullable: true
        lot_id:
          type: string
        entry_time:
          type: string
          format: date-time
          nullable: true

    ParkingFeeResponse:
      type: object
      properties:
        session_id:
          type: string
        lot_id:
          type: string
        amount:
          type: integer
          example: 6000
        duration:
          type: integer
          description: 주차 시간(분)
          example: 90
        currency:
          type: string
          example: KRW
        entry_time:
          type: string
          format: date-time
        status:
          type: string
          enum: [active]

    # ── Payment ───────────────────────────────
    PaymentRequest:
      type: object
      required: [session_id, amount, currency]
      properties:
        session_id:
          type: string
          example: "sess_park_001"
        amount:
          type: integer
          example: 6000
        currency:
          type: string
          example: KRW

    PaymentSuccessResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        tx_id:
          type: string
        session_id:
          type: string
        approval_no:
          type: string
        amount:
          type: integer
          example: 6000
        currency:
          type: string
          example: KRW

    PaymentFailedResponse:
      type: object
      properties:
        status:
          type: string
          enum: [failed]
        tx_id:
          type: string
        session_id:
          type: string
        failed_reason:
          type: string

    # ── PMS ───────────────────────────────────
    PmsPreRegisterRequest:
      type: object
      required: [lot_id, plate]
      properties:
        lot_id:
          type: string
          example: "lot_001"
        plate:
          type: string
          example: "12가 3456"

    PmsPreRegisterResponse:
      type: object
      properties:
        status:
          type: string
          enum: [registered]
        lot_id:
          type: string
        plate:
          type: string

    PmsLprEntryRequest:
      type: object
      required: [lot_id, plate, entry_time]
      properties:
        lot_id:
          type: string
          example: "lot_001"
        plate:
          type: string
          example: "12가 3456"
        entry_time:
          type: string
          format: date-time

    PmsLprEntryResponse:
      type: object
      properties:
        status:
          type: string
          enum: [created, existing]
        pms_session_id:
          type: string

    PmsFeeResponse:
      type: object
      properties:
        pms_session_id:
          type: string
        lot_id:
          type: string
        plate:
          type: string
        amount:
          type: integer
          example: 6000
        duration_minutes:
          type: integer
          description: 주차 시간(분)
          example: 90
        currency:
          type: string
          example: KRW
        entry_time:
          type: string
          format: date-time
        calculated_at:
          type: string
          format: date-time

    PmsPaymentCompleteRequest:
      type: object
      required: [pms_session_id, carpay_parking_session_id, carpay_tx_id, amount, currency, approval_no, idempotency_key]
      properties:
        pms_session_id:
          type: string
        carpay_parking_session_id:
          type: string
        carpay_tx_id:
          type: string
        amount:
          type: integer
          example: 6000
        currency:
          type: string
          example: KRW
        approval_no:
          type: string
        idempotency_key:
          type: string
          description: "SHA-256(session_id + car_id + amount + currency)"

    PmsPaymentCompleteResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success]
        pms_session_id:
          type: string
        carpay_tx_id:
          type: string

    # ── Mock PG ───────────────────────────────
    PgCardRegistrationSessionRequest:
      type: object
      required: [order_id]
      properties:
        order_id:
          type: string
          example: "order_xyz789"
        car_id:
          type: string
          example: "car_001"
        plate:
          type: string
          example: "12가3456"
        card_brand:
          type: string
          example: "현대카드"
        callback_url:
          type: string
          example: "http://carpayin-backend:8000/card/webhook"

    PgCardRegistrationSessionResponse:
      type: object
      required: [order_id, webview_url, pg_url]
      properties:
        order_id:
          type: string
          example: "order_xyz789"
        webview_url:
          type: string
          example: "https://pg.example.com/pg/card-register?order_id=order_xyz789"
        pg_url:
          type: string
          example: "https://pg.example.com/pg/card-register?order_id=order_xyz789"
        expires_at:
          type: string
          example: "2026-06-04T12:30:00"

    PgCardRegistrationRequest:
      type: object
      required: [order_id, card_number, expiry, cvc]
      properties:
        order_id:
          type: string
        card_number:
          type: string
        expiry:
          type: string
          example: "12/28"
        cvc:
          type: string

    PgCardRegistrationResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, failed]
        billing_key:
          type: string
          nullable: true

    PgBillingPaymentRequest:
      type: object
      required: [billing_key, amount, currency, idempotency_key]
      properties:
        billing_key:
          type: string
          example: "bk_aaa111"
        amount:
          type: integer
          example: 6000
        currency:
          type: string
          example: KRW
        idempotency_key:
          type: string
          description: "SHA-256(session_id + car_id + amount + currency)"

    PgBillingPaymentSuccessResponse:
      type: object
      properties:
        pg_tx_id:
          type: string
        approval_no:
          type: string
        status:
          type: string
          enum: [success]

    PgBillingPaymentFailedResponse:
      type: object
      properties:
        pg_tx_id:
          type: string
        status:
          type: string
          enum: [failed]
        failed_reason:
          type: string

    # ── Mock Card ─────────────────────────────
    CardVerifyRequest:
      type: object
      required: [user_id, card_number, expiry, cvc]
      properties:
        user_id:
          type: string
        card_number:
          type: string
        expiry:
          type: string
          example: "12/28"
        cvc:
          type: string

    CardVerifyResponse:
      type: object
      properties:
        card_token:
          type: string
        last_four:
          type: string

    CardChargeRequest:
      type: object
      required: [card_token, amount, currency, idempotency_key]
      properties:
        card_token:
          type: string
        amount:
          type: integer
        currency:
          type: string
          example: KRW
        idempotency_key:
          type: string

    CardChargeResponse:
      type: object
      properties:
        status:
          type: string
          enum: [success, failed]
        tx_id:
          type: string
        approval_no:
          type: string
          nullable: true

# ─────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────
paths:

  # ══════════════════════════════════════════
  # Health
  # ══════════════════════════════════════════
  /health:
    get:
      tags: [Health]
      summary: 서비스 헬스 체크
      description: ALB health check용 엔드포인트. 서비스가 정상이면 200을 반환합니다.
      responses:
        '200':
          description: 서비스 정상
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ══════════════════════════════════════════
  # Auth
  # ══════════════════════════════════════════
  /auth/qr-session:
    post:
      tags: [Auth]
      summary: QR 로그인 세션 생성
      description: |
        AAOS 앱이 loginSessionId와 vin_hash를 전달하면 Backend가 Redis에 QR 세션을 생성하고
        QR 코드로 표시할 로그인 URL을 반환합니다.
        
        **Redis 저장 (TTL: 15분)**
        ```
        key: qr_session:{loginSessionId}
        value: { vin_hash, status: "pending", created_at, expires_at }
        ```
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QrSessionCreateRequest'
      responses:
        '200':
          description: QR 세션 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QrSessionCreateResponse'
        '400':
          description: 잘못된 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/hyundai/start:
    get:
      tags: [Auth]
      summary: 현대 OAuth 로그인 시작 (QR 스캔 진입점)
      description: |
        사용자가 QR 코드를 스캔하면 휴대폰 브라우저가 이 URL로 접속합니다.
        Backend는 session_id로 Redis의 QR 세션을 확인 후 현대 OAuth 로그인 화면으로 redirect합니다.
        이때 내부 session_id를 그대로 넘기지 않고, 별도의 oauth_state를 생성해 현대 OAuth state로 전달합니다.
        Backend는 Redis에 oauth_state:{oauth_state} → session_id 매핑을 저장합니다.
      parameters:
        - name: session_id
          in: query
          required: true
          schema:
            type: string
          description: QR 세션 ID (loginSessionId)
          example: sess_abc123
      responses:
        '302':
          description: 현대 OAuth 로그인 화면으로 redirect
        '400':
          description: 유효하지 않거나 만료된 QR 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/redirect:
    get:
      tags: [Auth]
      summary: 현대 OAuth 콜백
      description: |
        현대 로그인 완료 후 현대가 이 URL로 authorization code와 state(=oauth_state)를 전달합니다.
        
        Backend 처리 흐름:
        1. state(oauth_state)로 Redis oauth_state:{oauth_state}를 조회해 원래 session_id 확인
        2. 현대 token API로 access/refresh token 발급
        3. 현대 사용자 정보 API 호출 (user_id, name)
        4. 현대 내 차량 리스트 조회 API 호출
        5. RDS users upsert, hyundai_tokens에 암호화된 refresh token 저장
        6. Redis hyundai_access:{user_id}에 access token 캐시
        7. Redis hyundai_oauth:{session_id}, app_login_result:{session_id}에 차량 목록과 임시 토큰 저장
        8. oauth_state:{state}는 used 처리 또는 삭제
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
          description: 현대 OAuth authorization code
        - name: state
          in: query
          required: true
          schema:
            type: string
          description: Backend가 생성한 OAuth state 값
      responses:
        '200':
          description: 콜백 처리 완료 (앱 polling 대기 상태로 전환)
        '400':
          description: 유효하지 않은 세션 또는 code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/session/{session_id}/status:
    get:
      tags: [Auth]
      summary: 로그인 세션 상태 polling
      description: |
        AAOS 앱이 QR 표시 후 로그인 완료 여부를 주기적으로 확인합니다.
        
        - **pending**: 현대 로그인 미완료
        - **complete**: 현대 로그인 및 차량 조회 완료. 차량 목록과 임시 토큰 반환.
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          description: QR 세션 ID
      responses:
        '200':
          description: 세션 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionStatusResponse'
        '400':
          description: OAuth 실패 상태
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 세션 없음 또는 만료
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/confirm-car:
    post:
      tags: [Auth]
      summary: 차량 연결 확정
      description: |
        사용자가 차량을 선택하면 앱이 이 API를 호출해 결제 주체 차량을 확정합니다.
        
        Backend 검증:
        1. 임시 app access token 검증
        2. car_id가 현대 API 차량 목록에 포함되는지 확인
        3. QR 세션의 vin_hash와 요청의 vin_hash 일치 여부 확인
        
        검증 완료 시:
        - RDS vehicles에 차량 저장
        - 최종 app access/refresh token 발급
        - RDS app_refresh_tokens에 refresh token hash 저장
        
        **Redis 임시 결과**
        ```
        key: hyundai_oauth:{session_id}
        value: { user_id, name, cars, temp_access_token }
        ```
        또는
        ```
        key: app_login_result:{session_id}
        value: { status: "complete", temp_access_token, user_id, name, cars }
        ```
        confirm-car 완료 후에는 Redis 임시 결과를 사용 완료 처리하거나 TTL 만료에 맡깁니다.
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmCarRequest'
      responses:
        '200':
          description: 차량 확정 및 최종 토큰 발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmCarResponse'
        '400':
          description: vin_hash 불일치 또는 유효하지 않은 car_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 임시 토큰 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: 앱 access token 재발급
      description: |
        만료된 app access token을 app refresh token으로 재발급합니다.

        Backend 처리:
        1. refresh token 원문의 hash를 계산한다.
        2. DB `app_refresh_tokens`에서 hash가 일치하고 status=active인 token을 조회한다.
        3. 만료된 token이면 status를 expired로 업데이트하고 401을 반환한다.
        4. revoked token이면 401을 반환한다.
        5. 유효하면 새 app access token을 발급한다.
        6. rotate 정책 적용 시 새 refresh token도 함께 발급하고 기존 token을 revoked 처리한다.

        **보안**: refresh token 원문은 DB에 저장하지 않으며, hash만 저장한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: access token 재발급 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: refresh token 없음, 만료(expired), 또는 폐기(revoked)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ══════════════════════════════════════════
  # Card
  # ══════════════════════════════════════════
  /card/order:
    post:
      tags: [Card]
      summary: 카드 등록 요청
      description: |
        차량 연결 완료 후 카드 등록을 시작합니다.
        
        Backend 처리:
        1. app access token 검증 (user_id, car_id 확인)
        2. RDS users, vehicles 유효성 확인
        3. plate, bank_name, agree_terms 검증
        4. 차량번호 정규화 및 차량 소유자 검증
        5. order_id 생성
        6. Redis에 카드 등록 세션 저장 (TTL: 30분)
           ```
           key: mock_pg_card_register:{order_id}
           value: { order_id, user_id, car_id, status: "pending", created_at, expires_at }
           ```
        7. PG internal API에 카드 등록 WebView URL 생성 요청
        8. order_id와 PG 카드 등록 webview_url 반환
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardOrderRequest'
      responses:
        '200':
          description: 카드 등록 요청 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardOrderResponse'
        '400':
          description: 약관 미동의 또는 차량번호 형식 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 사용자 또는 차량 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: MOLIT 차량 소유자 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: PG WebView URL 생성 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /card/webhook:
    post:
      tags: [Card]
      summary: 카드 등록 완료 webhook (Mock PG → Backend)
      description: |
        Mock PG가 카드 등록 완료 후 이 endpoint를 호출합니다.
        카드 원문 정보는 Car Pay-in Backend에 전달되지 않으며, billing_key만 수신합니다.
        
        Backend 처리:
        1. webhook signature 또는 HMAC 검증
        2. Redis에서 order_id로 카드 등록 세션 조회 및 status=pending 확인
        3. RDS vehicles에서 car_id 유효성 재확인
        4. RDS vehicle_billing_keys upsert
           - 최초 등록: INSERT (car_id, billing_key, card_last_four, status=active)
           - 카드 변경: UPDATE (billing_key, card_last_four, status=active, updated_at)
        5. Redis 카드 등록 세션 완료 처리 또는 삭제
        
        **멱등성**: Redis의 order_id 상태 + car_id PRIMARY KEY(vehicle_billing_keys)로 중복 처리 방지
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardWebhookRequest'
      responses:
        '200':
          description: 카드 등록 처리 완료
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
        '400':
          description: 유효하지 않은 세션 또는 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: webhook signature 검증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ══════════════════════════════════════════
  # Parking
  # ══════════════════════════════════════════
  /parking/lots:
    get:
      tags: [Parking]
      summary: 제휴 주차장 목록 조회
      description: |
        Android 앱과 시뮬레이션 서비스가 사용할 제휴 주차장 목록을 반환합니다.
        현재 구현은 로컬/시연용 정적 목록을 반환합니다.
      responses:
        '200':
          description: 제휴 주차장 목록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingLotsResponse'

  /sim/location:
    get:
      tags: [Parking]
      summary: 현재 시뮬레이션 차량 위치 조회
      description: |
        Webots 또는 로컬 테스트 UI가 마지막으로 저장한 시뮬레이션 차량 위치를 조회합니다.
      responses:
