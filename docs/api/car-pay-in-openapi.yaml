              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /parking/navigate:
    post:
      tags: [Parking]
      summary: 제휴 주차장 길안내 → 사전 입차 알림 등록
      description: |
        사용자가 앱에서 제휴 주차장 목록의 길안내 버튼을 누를 때 호출합니다.
        lot_id만 전달하면 되며, car_id와 plate는 토큰과 DB에서 자동으로 조회합니다.

        Backend 처리:
        1. app access token 검증 및 car_id, user_id 추출
        2. DB vehicles에서 car_id로 차량과 번호판 조회
        3. vehicle_billing_keys에 active 빌링키 존재 여부 확인

        검증 완료 시:
        - carpayin-redis에 사전 입차 상태 저장 (TTL: 1시간)
          ```
          key: parking_pre_notify:{lot_id}:{plate}
          value: { user_id, car_id, lot_id, plate, status: "incoming", created_at, expires_at }
          ```
        - PMS에 차량번호 사전 등록 요청 (pms-redis에 TTL 1시간 저장)
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NavigateRequest'
      responses:
        '200':
          description: 사전 입차 알림 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NavigateResponse'
        '400':
          description: active 빌링키 없음 또는 차량번호 미등록
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /webhook/entry:
    post:
      tags: [Parking]
      summary: 입차 이벤트 webhook (PMS → Backend)
      description: |
        PMS LPR 카메라가 차량번호 인식 후 입차 이벤트를 이 endpoint로 전송합니다.
        
        Backend 처리:
        1. X-PMS-Signature 등으로 PMS 신뢰 요청 여부 확인
        2. Redis에서 parking_pre_notify:{lot_id}:{plate} 조회
           - 없으면: Car Pay-in 비등록 차량으로 판단, 세션 미생성
        3. Redis의 user_id, car_id를 기준으로 처리
        4. RDS parking_sessions에서 car_id의 active 세션 중복 확인
        5. Car Pay-in DB parking_sessions에 주차 세션 생성 (status=active)
        6. Redis 사전 입차 등록 상태 완료 처리
        7. MQTT/AWS IoT로 앱에 입차 확정 알림 발행
           ```
           topic: parking/confirmed/{car_id}
           payload: { session_id, car_id, lot_id, plate, entry_time, status: "active" }
           ```
        
        **멱등성**: car_id당 active 세션 1개 제약(uniq_active_session_per_car)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EntryWebhookRequest'
      parameters:
        - name: X-PMS-Signature
          in: header
          required: true
          schema:
            type: string
          description: PMS webhook HMAC signature
      responses:
        '200':
          description: 입차 처리 완료. pre-notify가 없으면 status=not_registered로 반환하고 세션은 생성하지 않음.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntryWebhookResponse'
        '400':
          description: 유효하지 않은 요청
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: PMS 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /fee/{session_id}:
    get:
      tags: [Parking]
      summary: 현재 주차 요금 조회
      description: |
        앱이 입차 확정 알림의 session_id로 현재까지 누적된 주차 요금을 조회합니다.
        
        Backend 처리:
        1. app access token 검증 → car_id 확인
        2. Redis parking_fee_quote:{session_id} 조회
        3. quote가 있으면 그대로 반환
        4. quote가 없으면 RDS parking_sessions에서 session_id 조회
        5. 세션의 car_id와 토큰의 car_id 일치 확인
        6. 세션 status=active 확인
        7. PMS에 요금 조회 요청 (lot_id, plate 기준)
        8. PMS 결과를 Redis parking_fee_quote:{session_id}에 TTL 5분으로 저장
      security:
        - BearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
          description: 주차 세션 ID
      responses:
        '200':
          description: 요금 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParkingFeeResponse'
        '403':
          description: 세션 소유자 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: 세션 없음 또는 active 상태 아님
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '502':
          description: PMS 요금 조회 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ══════════════════════════════════════════
  # Payment
  # ══════════════════════════════════════════
  /payment:
    post:
      tags: [Payment]
      summary: 결제 요청
      description: |
        사용자가 정산 금액을 확인 후 결제를 승인하면 앱이 호출합니다.
        
        Backend 처리:
        1. app access token 검증 → car_id 확인
        2. RDS parking_sessions에서 session_id 조회 및 car_id·status=active 확인
        3. vehicle_billing_keys에서 active 빌링키 조회 (없으면 결제 거부)
        4. Redis parking_fee_quote:{session_id} 조회
        5. 앱의 amount·currency와 직전 quote 일치 확인 (없거나 불일치 시 최신 요금 재조회 안내)
        6. idempotency_key 생성: SHA-256(session_id + car_id + amount + currency)
        7. RDS transactions 중복 확인
           - success 이력 있음: 기존 결과 반환
           - pending 이력 있음: 기존 처리 상태 반환
           - 없음: transactions에 pending 상태로 생성
        8. Mock PG에 빌링키 결제 요청
        9. 결제 성공 시:
           - transactions: status=success, pg_tx_id, approval_no 업데이트
           - parking_sessions: status=completed, exit_time=now() 업데이트
           - PMS에 결제 완료 통보
           - MQTT/AWS IoT로 결제 완료 알림 발행
             ```
             topic: payment/complete/{car_id}
             payload: { tx_id, session_id, lot_id, amount, currency, approval_no, status: "success" }
             ```
        10. 결제 실패 시:
           - transactions: status=failed 업데이트
           - parking_sessions: active 상태 유지
           - PMS에 완료 통보 없음
        
        **transactions.billing_key**: 결제 당시 차량에 연결된 billing_key 스냅샷 저장
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentRequest'
      responses:
        '200':
          description: 결제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentSuccessResponse'
        '402':
          description: 결제 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentFailedResponse'
        '403':
          description: 세션 소유자 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: quote 없음/만료 또는 amount/currency 불일치 - 최신 요금 재조회 필요
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: active 빌링키 없음 또는 유효하지 않은 세션
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 인증 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ══════════════════════════════════════════
  # PMS 연동 API (Car Pay-in Backend → PMS)
  # ══════════════════════════════════════════
  /parking/pre-register:
    post:
      tags: [PMS]
      summary: 차량번호 사전 등록 (→ PMS)
      description: |
        Car Pay-in Backend가 PMS에 입차 예정 차량을 사전 등록합니다.
        PMS는 해당 차량번호와 주차장 ID를 입차 감지 대상으로 등록합니다.

        요청 URL: `POST {PMS_URL}/parking/pre-register`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PmsPreRegisterRequest'
      responses:
        '200':
          description: 사전 등록 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PmsPreRegisterResponse'

  /lpr/entry:
    post:
      tags: [PMS]
      summary: LPR 입차 이벤트 시뮬레이션
      description: |
        Mock PMS 내부에서 LPR 입차 이벤트를 발생시켜 PMS 세션을 생성하고,
        Car Pay-in Backend의 `/webhook/entry`로 전달할 payload를 만든다.

        요청 URL: `POST {PMS_URL}/lpr/entry`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PmsLprEntryRequest'
      responses:
        '200':
          description: PMS 세션 생성 또는 기존 active 세션 반환
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PmsLprEntryResponse'

  /parking/fee:
    get:
      tags: [PMS]
      summary: 주차 요금 조회 (→ PMS)
      description: |
        Car Pay-in Backend가 PMS에 현재 주차 요금을 조회합니다.
        PMS는 plate, lot_id로 active 세션을 찾아 입차 시각부터 현재까지의 요금을 계산합니다.

        요청 URL: `GET {PMS_URL}/parking/fee`
      parameters:
        - name: lot_id
          in: query
          required: true
          schema:
            type: string
        - name: plate
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 요금 조회 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PmsFeeResponse'
        '404':
          description: active PMS session 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /payment/complete:
    post:
      tags: [PMS]
      summary: 결제 완료 통보 (→ PMS)
      description: |
        Car Pay-in Backend가 PMS에 결제 완료를 통보합니다.
        PMS는 해당 결과를 payment_requests에 저장하고, 출구 차단기 개방 기준으로 사용합니다.

        요청 URL: `POST {PMS_URL}/payment/complete`
        
        **멱등성**: payment_requests.idempotency_key UNIQUE 제약으로 중복 저장 방지
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PmsPaymentCompleteRequest'
      responses:
        '200':
          description: 결제 완료 처리 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PmsPaymentCompleteResponse'
        '409':
          description: PMS idempotency conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ══════════════════════════════════════════
  # Mock PG 연동 API (Car Pay-in Backend → Mock PG)
  # ══════════════════════════════════════════
  /pg/internal/card-registration/sessions:
    post:
      tags: [MockPG]
      summary: 카드 등록 WebView URL 생성 요청 (Car Pay-in → PG)
      description: |
        Car Pay-in Backend가 order_id를 만든 뒤 PG internal ALB로 호출한다.
        PG는 카드 정보를 받지 않고, order_id가 포함된 public WebView URL만 생성해 반환한다.

        실제 요청 URL: `POST {PG_INTERNAL_BASE_URL}/pg/internal/card-registration/sessions`

        반환된 `webview_url`은 AAOS 앱이 WebView로 연다.
        사용자가 입력한 카드번호, 유효기간, CVC는 WebView 안에서 PG public ALB로 직접 전송된다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PgCardRegistrationSessionRequest'
      responses:
        '200':
          description: PG WebView URL 생성 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PgCardRegistrationSessionResponse'

  /pg/card-register:
    post:
      tags: [MockPG]
      summary: 카드 등록 WebView 완료 처리
      description: |
        Mock PG 카드 등록 WebView에서 입력받은 카드 정보를 Mock Card에 검증 요청하고,
        성공 시 billing_key를 발급한다.

        실제 요청 URL: `POST {PG_URL}/card-register`
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PgCardRegistrationRequest'
      responses:
        '200':
          description: 카드 등록 처리 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PgCardRegistrationResponse'

  /pg/payments/billing:
    post:
      tags: [MockPG]
      summary: 빌링키 결제 요청 (→ Mock PG)
      description: |
        Car Pay-in Backend가 Mock PG에 빌링키 기반 결제를 요청합니다.
        
        실제 요청 URL: `POST {PG_URL}/payments/billing`
        
        Mock PG 처리:
        1. idempotency_key 중복 확인 (기존 거래 있으면 재사용)
        2. billing_key 유효성 확인 (없거나 status != active이면 실패)
        3. card_token으로 Mock Card 서버에 카드 승인 요청
        4. 승인 결과에 따라 pg_tx_id, approval_no 또는 failed_reason 반환
        
        **멱등성**: Mock PG DB transactions.idempotency_key UNIQUE 제약
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PgBillingPaymentRequest'
      responses:
        '200':
          description: 결제 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PgBillingPaymentSuccessResponse'
        '400':
          description: 결제 실패
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PgBillingPaymentFailedResponse'

  # ══════════════════════════════════════════
  # Mock Card API (Mock PG → Mock Card)
  # ══════════════════════════════════════════
  /cards/verify:
    post:
      tags: [MockCard]
      summary: 카드 검증과 card token 발급
      description: |
        Mock PG가 카드 등록 WebView에서 받은 카드 정보를 Mock Card에 검증 요청한다.
        성공 시 실제 카드번호 대신 결제 승인에 사용할 card_token을 반환한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardVerifyRequest'
      responses:
        '200':
          description: 카드 검증 성공
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardVerifyResponse'
        '400':
          description: 만료 카드 또는 유효하지 않은 카드
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /cards/charge:
    post:
      tags: [MockCard]
      summary: card token 결제 승인
      description: |
        Mock PG가 billing_key로 찾은 card_token을 사용해 Mock Card에 결제 승인을 요청한다.
        같은 idempotency_key 요청은 기존 거래 결과를 반환한다.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CardChargeRequest'
      responses:
        '200':
          description: 카드 승인 처리 결과
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CardChargeResponse'
        '400':
          description: 유효하지 않은 amount 등 요청 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
