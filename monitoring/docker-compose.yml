services:
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: carpayin-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
      - "--web.enable-lifecycle"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.3
    container_name: carpayin-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-carpayin123}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/carpayin-dashboard.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped

  db-exporter:
    build:
      context: ./exporters
      dockerfile: Dockerfile
    container_name: carpayin-db-exporter
    ports:
      - "9001:9001"
    env_file:
      - .env
    environment:
      SCRAPE_INTERVAL_SECONDS: ${SCRAPE_INTERVAL_SECONDS:-5}
      EXPORTER_PORT: "9001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    container_name: carpayin-redis-exporter
    ports:
      - "9121:9121"
    environment:
      REDIS_ADDR: ${CARPAYIN_REDIS_URL:-redis://host.docker.internal:6379}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped


volumes:
  prometheus_data:
  grafana_data:
